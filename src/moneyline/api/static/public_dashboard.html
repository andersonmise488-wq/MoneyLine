<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoneyLine — Free Arbs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0c1222; --card:#141e30; --text:#eef2f7; --muted:#8b9cb3; --accent:#3dd68c; --accent2:#22c55e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:980px; margin:0 auto; padding:1.5rem 1.25rem 3rem; }
    .live-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .badge { font-size:.72rem; padding:.25rem .55rem; border-radius:999px; background:#243044; color:var(--muted); }
    .badge.live { background:#1e3a2f; color:var(--accent); }
    .badge.scan { background:#3a2e1e; color:#f5a623; }
    .hero { background:linear-gradient(145deg,#0c1222,#0f2a1f,#071510); border:1px solid rgba(34,197,94,.2); border-radius:16px; padding:1.6rem; margin-bottom:1rem; }
    .hero h1 { margin:0 0 .35rem; font-size:1.75rem; }
    .hero p { margin:0; color:#86efac; font-size:.95rem; }
    .calc { background:var(--card); border:1px solid #243044; border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-end; }
    .calc label { display:block; font-size:.75rem; color:var(--muted); margin-bottom:.35rem; }
    .calc input { background:#0f172a; border:1px solid #334155; color:var(--text); padding:.55rem .75rem; border-radius:8px; font-size:1rem; width:160px; font-family:inherit; }
    .calc .hint { font-size:.82rem; color:var(--muted); }
    .stat { font-size:.9rem; margin-bottom:.75rem; }
    .stat strong { color:var(--accent); }
    table { width:100%; border-collapse:collapse; background:var(--card); }
    th,td { padding:.55rem .65rem; text-align:left; border-bottom:1px solid #1e293b; font-size:.82rem; vertical-align:top; }
    th { color:var(--muted); font-weight:500; position:sticky; top:0; background:#1e293b; }
    .margin { color:var(--accent); font-weight:600; white-space:nowrap; }
    .legs { font-size:.78rem; color:#cbd5e1; line-height:1.45; }
    .profit { color:var(--accent2); font-size:.78rem; margin-top:.25rem; }
    .place-bet { display:inline-block; margin-left:.15rem; padding:.15rem .45rem; border-radius:6px; background:#166534; color:#ecfdf5; text-decoration:none; font-weight:600; font-size:.72rem; white-space:nowrap; }
    .place-bet:hover { background:#15803d; }
    .table-wrap { max-height:58vh; overflow:auto; border-radius:12px; border:1px solid #243044; margin-bottom:1.25rem; }
    .cta { text-align:center; background:#052e16; border:1px solid #166534; border-radius:14px; padding:1.2rem; }
    .cta a { display:inline-block; background:var(--accent2); color:#052e16; text-decoration:none; font-weight:700; padding:.65rem 1.2rem; border-radius:8px; margin-top:.5rem; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="live-bar">
      <span class="muted" id="status">Connecting…</span>
      <span class="badge" id="conn">WS</span>
    </div>

    <div class="hero">
      <h1>Free opportunities</h1>
      <p id="hero-sub">Live arbs at ≤3% margin — enter your bankroll to compute stakes.</p>
    </div>

    <div class="calc">
      <div>
        <label for="bankroll">Your bankroll (KES)</label>
        <input id="bankroll" type="number" min="100" step="100" value="10000" />
      </div>
      <div class="hint">Stakes update instantly for every free arb below.</div>
    </div>

    <div class="stat" id="summary">Loading…</div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Margin</th><th>Fixture</th><th>Market</th><th>Legs &amp; stakes</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="cta">
      <h3 style="margin:0;color:#4ade80" id="premium-cta">Want more?</h3>
      <p class="muted" style="margin:.35rem 0 0">Subscribe for premium arbs above 3% with no cap.</p>
      <a href="https://t.me/THorseKe_bot" target="_blank" rel="noopener">Open Telegram bot</a>
    </div>
  </div>
  <script src="/static/arb_calc.js"></script>
  <script>
    const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/public`;
    let ws, pingTimer, lastData = null;

    function bankroll() {
      return Math.max(0, Number(document.getElementById("bankroll").value) || 0);
    }

    function renderRows() {
      if (!lastData) return;
      const tbody = document.getElementById("rows");
      const opps = lastData.opportunities || [];
      const br = bankroll();
      tbody.innerHTML = "";
      if (!opps.length) {
        const prem = lastData.premium_count || 0;
        const msg = prem > 0
          ? `No free arbs (≤${lastData.public_max_margin_pct || 3}%) right now. ${prem} premium arbs available to subscribers.`
          : "No free-band arbs right now.";
        tbody.innerHTML = `<tr><td colspan="4" class="muted" style="text-align:center;padding:1.5rem">${msg}</td></tr>`;
        return;
      }
      opps.forEach(o => {
        const profit = calcProfit(o.legs, br);
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="margin">${Number(o.margin_pct).toFixed(2)}%</td>
          <td>${o.match}<br><span class="muted">${o.sport}</span></td>
          <td>${o.market || "—"}</td>
          <td><div class="legs">${fmtLegsWithStakes(o.legs, br, o)}</div>
          ${profit ? `<div class="profit">Profit ${fmtKes(profit.profit)} · return ${fmtKes(profit.guaranteedReturn)}</div>` : ""}</td>`;
        tbody.appendChild(tr);
      });
    }

    function renderSummary() {
      if (!lastData) return;
      const free = lastData.total ?? 0;
      const prem = lastData.premium_count ?? 0;
      document.getElementById("summary").innerHTML =
        `<strong>${free}</strong> free arbs (≤${lastData.public_max_margin_pct || 3}%)` +
        (prem ? ` · <span class="muted">${prem} premium (subscribe)</span>` : "");
      document.getElementById("premium-cta").textContent =
        prem ? `${prem} premium arbs waiting` : "Subscribe for premium arbs";
    }

    function render(data) {
      if (data.type === "scan_start") {
        document.getElementById("conn").textContent = "Updating";
        document.getElementById("conn").className = "badge scan";
        document.getElementById("status").textContent = "Scan in progress";
        return;
      }
      if (data.type !== "public_snapshot") return;
      document.getElementById("conn").textContent = "Live";
      document.getElementById("conn").className = "badge live";
      document.getElementById("status").textContent = data.scanning ? "Updating…" : "Connected";
      lastData = data;
      renderSummary();
      renderRows();
    }

    document.getElementById("bankroll").addEventListener("input", renderRows);

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => { pingTimer = setInterval(() => { if (ws.readyState === 1) ws.send("ping"); }, 25000); };
      ws.onclose = () => { clearInterval(pingTimer); setTimeout(connect, 3000); };
      ws.onmessage = (ev) => { try { render(JSON.parse(ev.data)); } catch (e) {} };
    }
    connect();
  </script>
</body>
</html>
