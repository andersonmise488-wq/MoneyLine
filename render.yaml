services:
  - type: web
    name: moneyline
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app/src
      - key: WEB_SCAN_MIN_MARGIN_PCT
        value: "0.0"
      - key: WEB_SCAN_MAX_EVENTS
        value: "0"
      - key: WEB_SCAN_MAX_MARKETS
        value: "0"
      - key: MATCH_FIRST_MARKETS
        value: "true"
      - key: MARKET_FETCH_CONCURRENCY
        value: "50"
      - key: RAW_CACHE_TTL_SECONDS
        value: "0"
      - key: ODDS_STALENESS_SECONDS
        value: "0"
      - key: WEB_SCAN_INTERVAL_MINUTES
        value: "20"
      - key: WEB_SCAN_POLL_SECONDS
        value: "60"
      - key: ALERT_DEDUP_MINUTES
        value: "20"
      - key: ALERT_MIN_MARGIN_PCT
        value: "5.0"
      - key: SCAN_AUTO_ALERTS_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_IDS
        sync: false
      - key: WEB_ADMIN_TOKEN
        sync: false
      - key: WEB_ALLOWED_ORIGINS
        sync: false
      - key: STANBIC_CLIENT_ID
        sync: false
      - key: STANBIC_CLIENT_SECRET
        sync: false
      - key: STANBIC_BILL_ACCOUNT_REF
        sync: false
      - key: STANBIC_CALLBACK_URL
        sync: false
      - key: STANBIC_ENV
        value: sandbox
